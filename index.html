<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtrlar</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <aside class="filter">
        <div class="filter__section">
            <h4 class="filter__title">Модель</h4>
            <input type="text" class="filter__input" placeholder="Введите модель шины">
            
            <div class="filter__grid">
                <label class="filter__label">
                    <input type="checkbox" class="real-checkbox" checked>
                    <span class="custom-checkbox"></span>
                    ALINA
                </label>
                <label class="filter__label">
                    <input type="checkbox" class="real-checkbox" checked>
                    <span class="custom-checkbox"></span>
                    BLIWWAS
                </label>
                <label class="filter__label">
                    <input type="checkbox" class="real-checkbox">
                    <span class="custom-checkbox"></span>
                    FORCE Moode
                </label>
                <label class="filter__label">
                    <input type="checkbox" class="real-checkbox">
                    <span class="custom-checkbox"></span>
                    ICE Gide
                </label>
            </div>
            <a href="#" class="filter__more">Показать еще</a>
        </div>

        <div class="filter__section">
            <h4 class="filter__title">Технология <span class="filter__help">?</span></h4>
            <div class="filter__grid">
                <label class="filter__label">
                    <input type="radio" name="technology" class="real-radio">
                    <span class="custom-radio"></span>
                    Да
                </label>
                <label class="filter__label">
                    <input type="radio" name="technology" class="real-radio">
                    <span class="custom-radio"></span>
                    Нет
                </label>
            </div>
        </div>

        <div class="filter__section">
            <h4 class="filter__title">Акции</h4>
            <div class="filter__badges">
                <span class="badge badge--gradient">SALE</span>
                <span class="badge">NEW</span>
                <span class="badge">HIT</span>
                <span class="badge badge--gradient badge--wide">ПОДАРОК</span>
            </div>
        </div>

        <div class="filter__section">
            <h4 class="filter__title">Страны</h4>
            <div class="filter__grid">
                <label class="filter__label">
                    <input type="checkbox" class="real-checkbox" checked>
                    <span class="custom-checkbox"></span>
                    Россия
                </label>
                <label class="filter__label">
                    <input type="checkbox" class="real-checkbox" checked>
                    <span class="custom-checkbox"></span>
                    Германия
                </label>
                <label class="filter__label">
                    <input type="checkbox" class="real-checkbox">
                    <span class="custom-checkbox"></span>
                    Россия
                </label>
                <label class="filter__label">
                    <input type="checkbox" class="real-checkbox">
                    <span class="custom-checkbox"></span>
                    Германия
                </label>
            </div>
            <a href="index.html" class="filter__more">Показать еще</a>
        </div>
    </aside>

</body>
</html>
