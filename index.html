<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtrlar</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <aside class="filter">
        <div class="filter__section">
            <h4 class="filter__title">Модель</h4>
            <input type="text" class="filter__input" placeholder="Введите модель шины">
            
            <div class="filter__grid">
                <label class="filter__checkbox">
                    <input type="checkbox" checked> ALINA
                </label>
                <label class="filter__checkbox">
                    <input type="checkbox" checked> BLIWWAS
                </label>
                <label class="filter__checkbox">
                    <input type="checkbox"> FORCE Moode
                </label>
                <label class="filter__checkbox">
                    <input type="checkbox"> ICE Gide
                </label>
            </div>
            <a href="#" class="filter__more">Показать еще</a>
        </div>

        <div class="filter__section">
            <h4 class="filter__title">Технология <span class="filter__help">?</span></h4>
            <div class="filter__grid">
                <label class="filter__checkbox">
                    <input type="checkbox"> Да
                </label>
                <label class="filter__checkbox">
                    <input type="checkbox"> Нет
                </label>
            </div>
        </div>

        <div class="filter__section">
            <h4 class="filter__title">Акции</h4>
            <div class="filter__badges">
                <span class="badge badge--gradient">SALE</span>
                <span class="badge">NEW</span>
                <span class="badge">HIT</span>
                <span class="badge badge--gradient badge--wide">ПОДАРОК</span>
            </div>
        </div>

        <div class="filter__section">
            <h4 class="filter__title">Страны</h4>
            <div class="filter__grid">
                <label class="filter__checkbox">
                    <input type="checkbox" checked> Россия
                </label>
                <label class="filter__checkbox">
                    <input type="checkbox" checked> Германия
                </label>
                <label class="filter__checkbox">
                    <input type="checkbox"> Россия
                </label>
                <label class="filter__checkbox">
                    <input type="checkbox"> Германия
                </label>
            </div>
            <a href="index.html" class="filter__more">Показать еще</a>
        </div>
    </aside>

</body>
</html>
